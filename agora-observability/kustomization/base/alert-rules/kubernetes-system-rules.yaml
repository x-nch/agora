apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: kubernetes-system
  namespace: monitoring
spec:
  groups:
  - name: kubernetes-system
    rules:
    - alert: NodeNotReady
      expr: kube_node_status_condition{condition="Ready",status="true"} == 0
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "Node {{ $labels.node }} is not ready"
        runbook: "docs/RUNBOOKS.md"
    - alert: PodOOMKilled
      expr: kube_pod_container_status_last_terminated_reason{reason="OOMKilled"} == 1
      for: 0m
      labels:
        severity: warning
      annotations:
        summary: "Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} was OOMKilled"
        runbook: "docs/RUNBOOKS.md"
    - alert: PodCrashLooping
      expr: rate(kube_pod_container_status_restarts_total[15m]) > 0
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} is crash looping"
        runbook: "docs/RUNBOOKS.md"
    - alert: DeploymentReplicasMismatch
      expr: kube_deployment_spec_replicas != kube_deployment_status_replicas_available
      for: 10m
      labels:
        severity: warning
      annotations:
        summary: "Deployment {{ $labels.deployment }} has mismatched replicas"
        runbook: "docs/RUNBOOKS.md"
    - alert: ResourceQuotaNearLimit
      expr: kube_resourcequota_used / kube_resourcequota_hard > 0.85
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Resource quota {{ $labels.resourcequota }} in namespace {{ $labels.namespace }} is over 85%"
        runbook: "docs/RUNBOOKS.md"
    - alert: DiskPressure
      expr: (node_filesystem_avail_bytes{mountpoint="/", fstype!="tmpfs"} / node_filesystem_size_bytes{mountpoint="/", fstype!="tmpfs"}) < 0.15
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Node {{ $labels.node }} has less than 15% disk space available"
        runbook: "docs/RUNBOOKS.md"
    - alert: NodeHighMemory
      expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) > 0.90
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Node {{ $labels.node }} memory usage is over 90%"
        runbook: "docs/RUNBOOKS.md"
    - alert: HPAMaxReplicas
      expr: kube_horizontalpodautoscaler_status_current_replicas == kube_horizontalpodautoscaler_spec_max_replicas
      for: 10m
      labels:
        severity: warning
      annotations:
        summary: "HPA {{ $labels.horizontalpodautoscaler }} in namespace {{ $labels.namespace }} has reached max replicas"
        runbook: "docs/RUNBOOKS.md"
