apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-exporter
  namespace: monitoring
  labels:
    app: kafka-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka-exporter
  template:
    metadata:
      labels:
        app: kafka-exporter
    spec:
      containers:
      - name: kafka-exporter
        image: danielqsj/kafka-exporter:v1.7.0
        args:
        - --kafka.server=localhost:9092
        - --kafka.version=2.8.0
        - --topic.filter=.*
        - --group.filter=.*
        ports:
        - containerPort: 9308
      - name: aws-signing-proxy
        image: amazon/aws-signing-proxy:latest
        args:
        - --target-url=BROKER:9098
        - --name=kafka
        - --region=ap-northeast-1
        - --port=9092
        env:
        - name: AWS_ROLE_ARN
          valueFrom:
            fieldRef:
              fieldPath: metadata.annotations['eks.amazonaws.com/role-arn']
