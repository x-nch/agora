apiVersion: iam.services.k8s.aws/v1alpha1
kind: Policy
metadata:
  name: traffic-optimizer-msk-policy
spec:
  policyDocument:
    Version: "2012-10-17"
    Statement:
      - Effect: Allow
        Action:
          - kafka-cluster:Connect
          - kafka-cluster:DescribeGroup
        Resource: "*"
      - Effect: Allow
        Action:
          - kafka-cluster:ReadData
        Resource:
          - "arn:aws:kafka:ap-northeast-1:ACCOUNT_ID:topic/agora-cluster/vehicle.telemetry"
          - "arn:aws:kafka:ap-northeast-1:ACCOUNT_ID:topic/agora-cluster/signal.events"
      - Effect: Allow
        Action:
          - kafka-cluster:WriteData
        Resource:
          - "arn:aws:kafka:ap-northeast-1:ACCOUNT_ID:topic/agora-cluster/signal.commands"
          - "arn:aws:kafka:ap-northeast-1:ACCOUNT_ID:topic/agora-cluster/incidents"
---
