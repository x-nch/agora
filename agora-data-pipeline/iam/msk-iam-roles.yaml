apiVersion: iam.services.k8s.aws/v1alpha1
kind: Policy
metadata:
  name: kafka-connect-msk-policy
spec:
  policyDocument:
    Version: "2012-10-17"
    Statement:
      - Effect: Allow
        Action:
          - kafka-cluster:Connect
          - kafka-cluster:DescribeGroup
        Resource: "*"
      - Effect: Allow
        Action:
          - kafka-cluster:ReadData
        Resource: "*"
      - Effect: Allow
        Action:
          - s3:PutObject
        Resource:
          - "arn:aws:s3:::agora-prod-data-lake/*"
---
apiVersion: iam.services.k8s.aws/v1alpha1
kind: Policy
metadata:
  name: schema-registry-msk-policy
spec:
  policyDocument:
    Version: "2012-10-17"
    Statement:
      - Effect: Allow
        Action:
          - kafka-cluster:Connect
        Resource: "*"
      - Effect: Allow
        Action:
          - kafka-cluster:ReadData
          - kafka-cluster:WriteData
        Resource:
          - "arn:aws:kafka:ap-northeast-1:ACCOUNT_ID:topic/agora-cluster/_schemas_agora"
---
