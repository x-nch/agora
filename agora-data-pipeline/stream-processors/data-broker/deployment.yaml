apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-broker
  labels:
    app: data-broker
spec:
  replicas: 5
  selector:
    matchLabels:
      app: data-broker
  template:
    metadata:
      labels:
        app: data-broker
    spec:
      serviceAccountName: data-broker
      containers:
        - name: data-broker
          image: agora/data-broker:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: metrics
          envFrom:
            - configMapRef:
                name: data-broker-config
          resources:
            requests:
              cpu: "2"
              memory: "4Gi"
            limits:
              cpu: "4"
              memory: "8Gi"
          readinessProbe:
            httpGet:
              path: /metrics
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /metrics
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
