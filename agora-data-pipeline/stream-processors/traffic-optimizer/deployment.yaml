apiVersion: apps/v1
kind: Deployment
metadata:
  name: traffic-optimizer
  namespace: city-services
  labels:
    app: traffic-optimizer
    component: stream-processor
spec:
  replicas: 3
  selector:
    matchLabels:
      app: traffic-optimizer
  template:
    metadata:
      labels:
        app: traffic-optimizer
        component: stream-processor
    spec:
      serviceAccountName: traffic-optimizer
      containers:
        - name: processor
          image: agora/traffic-optimizer:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: traffic-optimizer-config
          env:
            - name: BOOTSTRAP_SERVERS
              value: "b-1:9098,b-2:9098,b-3:9098"
            - name: SCHEMA_REGISTRY_URL
              value: "http://schema-registry:8081"
          resources:
            requests:
              cpu: 1
              memory: 2Gi
            limits:
              cpu: 2
              memory: 4Gi
          readinessProbe:
            exec:
              command: ["python", "-c", "import confluent_kafka; print('ok')"]
            initialDelaySeconds: 15
            periodSeconds: 10
