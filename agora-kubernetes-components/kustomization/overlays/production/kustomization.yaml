apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

commonAnnotations:
  env: production

resources:
  - ../../base/

transformers:
  - namespace-exclusion.yaml

patches:
  - path: patches/scale-traffic-optimizer.yaml
    target:
      kind: Deployment
      name: traffic-optimizer
  - path: patches/scale-energy-management.yaml
    target:
      kind: Deployment
      name: energy-management
  - path: patches/scale-data-broker.yaml
    target:
      kind: Deployment
      name: data-broker
  - path: patches/scale-api-gateway.yaml
    target:
      kind: Deployment
      name: api-gateway
  - path: patches/strict-anti-affinity.yaml
    target:
      kind: Deployment
      name: traffic-optimizer
