apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: agora-critical
value: 1000
globalDefault: false
description: "Critical Agora platform services (api-gateway, data-broker)"
---
apiVersion: scheduling.k8s.io/v1
