apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: data-broker
  namespace: city-services
  labels:
    app.kubernetes.io/name: data-broker
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: data-broker
  minReplicas: 3
  maxReplicas: 15
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
        - type: Percent
          value: 100
          periodSeconds: 60
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
