apiVersion: apps/v1
kind: Deployment
metadata:
  name: energy-management
  namespace: city-services
  labels:
    app.kubernetes.io/name: energy-management
    app.kubernetes.io/component: core-service
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: energy-management
  template:
    metadata:
      labels:
        app.kubernetes.io/name: energy-management
        app.kubernetes.io/component: core-service
      annotations:
        sidecar.istio.io/inject: "true"
    spec:
      priorityClassName: agora-high
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: energy-management
                topologyKey: topology.kubernetes.io/zone
      containers:
        - name: energy-management
          image: agora/energy-management:v1.0.0
          ports:
            - containerPort: 8080
              protocol: TCP
              name: http
          env:
            - name: JAVA_OPTS
              value: "-Xms384m -Xmx512m"
            - name: DATA_BROKER_URL
              value: "http://data-broker:8080"
          resources:
            requests:
              cpu: 300m
              memory: 384Mi
            limits:
              cpu: 700m
              memory: 768Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
          startupProbe:
            httpGet:
              path: /startup
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 30
      serviceAccountName: energy-management
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
