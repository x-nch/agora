apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: energy-management
  namespace: city-services
  labels:
    app.kubernetes.io/name: energy-management
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: energy-management
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
