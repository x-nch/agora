apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: traffic-optimizer
  namespace: monitoring
  labels:
    app.kubernetes.io/name: traffic-optimizer
    release: prometheus
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: traffic-optimizer
  namespaceSelector:
    matchNames:
      - city-services
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 15s
      scrapeTimeout: 10s
