apiVersion: apps/v1
kind: Deployment
metadata:
  name: traffic-optimizer
  namespace: city-services
  labels:
    app.kubernetes.io/name: traffic-optimizer
    app.kubernetes.io/component: core-service
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: traffic-optimizer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: traffic-optimizer
        app.kubernetes.io/component: core-service
      annotations:
        sidecar.istio.io/inject: "true"
    spec:
      priorityClassName: agora-high
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: traffic-optimizer
                topologyKey: topology.kubernetes.io/zone
      containers:
        - name: traffic-optimizer
          image: agora/traffic-optimizer:v1.0.0
          ports:
            - containerPort: 8080
              protocol: TCP
              name: http
          env:
            - name: JAVA_OPTS
              value: "-Xms512m -Xmx1024m"
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "agora-msk-cluster.aws:9098"
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
          startupProbe:
            httpGet:
              path: /startup
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30
      serviceAccountName: traffic-optimizer
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
