apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: agora-alerts
  namespace: monitoring
spec:
  groups:
  - name: agora.rules
    rules:
    - alert: TrafficOptimizerLatencyHigh
      expr: histogram_quantile(0.99, sum(rate(traffic_optimizer_request_duration_seconds_bucket[5m])) by (le)) > 0.1
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: Traffic Optimizer P99 latency is above 100ms

    - alert: EnergyManagementErrorRateHigh
      expr: rate(energy_management_errors_total[5m]) > 0.001
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: Energy Management error rate is above 0.1%

    - alert: PodCrashLooping
      expr: rate(kube_pod_container_status_restarts_total[5m]) > 0.1
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: Pod is crash looping

    - alert: HighMemoryUsage
      expr: container_memory_usage_bytes / container_spec_memory_limit_bytes > 0.9
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: Container memory usage is above 90%
