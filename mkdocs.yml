# Agora Platform Documentation — MkDocs Configuration
# Source: mkdocs.yml
# Build: mkdocs build
# Serve: mkdocs serve

site_name: Agora Platform Documentation
site_description: Complete documentation for Woven City's Agora smart city platform — infrastructure, Kubernetes, data pipeline, operations, and security
site_author: Woven by Toyota
site_url: https://agora.woven-city.jp/docs
repo_url: https://github.com/woven-by-toyota/agora
repo_name: woven-by-toyota/agora
edit_uri: edit/main/docs/
copyright: Proprietary — Woven by Toyota / Agora Platform

theme:
  name: material
  language: en
  features:
    # Navigation
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.indexes
    - navigation.top
    - navigation.tracking
    - toc.follow
    - toc.integrate
    # Search
    - search.suggest
    - search.highlight
    - search.share
    # Content
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.tooltips
    # Header
    - header.autohide
    # Others
    - announce.dismiss
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    logo: material/city
    repo: fontawesome/brands/github

plugins:
  - search:
      separator: '[\s\-\._]+'
      lang:
        - en
        - ja
  - minify:
      minify_html: true
      minify_js: true
      minify_css: true
      htmlmin_opts:
        remove_comments: true
  - git-revision-date-localized:
      enable_creation_date: true
      type: date
  - git-committers:
      repository: woven-by-toyota/agora
      branch: main
  - awesome-pages:
      filename: .pages.yml
  - glightbox:
      touchNavigation: true
      draggable: true
      loop: false
      effect: zoom
      width: 100%
      height: auto
      zoomable: true
      caption_position: bottom

markdown_extensions:
  # Python Markdown
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
      toc_depth: 3
  # PyMdown
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink:
      repo_url_shorthand: true
      user: woven-by-toyota
      repo: agora
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/woven-by-toyota/agora
    - icon: fontawesome/brands/aws
      link: https://aws.amazon.com
  consent:
    title: Documentation Analytics
    description: >-
      We use cookies to improve documentation quality. No personal data is collected.
    cookies:
      analytics: Google Analytics (optional)
  analytics:
    provider: google
    property: G-XXXXXXXXXX
    feedback:
      title: Was this page helpful?
      ratings:
        - icon: material/emoticon-happy-outline
          name: This page was helpful
          data: 1
          note: >-
            Thanks for your feedback!
        - icon: material/emoticon-sad-outline
          name: This page could be improved
          data: 0
          note: >-
            Thanks for your feedback! Help us improve by opening a GitHub issue.

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - https://unpkg.com/tablesort@5.3.0/dist/tablesort.min.js
  - javascripts/tablesort.js

